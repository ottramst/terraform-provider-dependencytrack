name: Tests

on:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: Terraform Provider Acceptance Tests
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.dtrack.experimental || false }}
    env:
      DEPENDENCYTRACK_ENDPOINT: http://localhost:8081
      DEPENDENCYTRACK_USERNAME: admin
      DEPENDENCYTRACK_PASSWORD: admin123
    strategy:
      fail-fast: false
      matrix:
        dtrack:
          - { version: '4.14.2', compose: docker-compose.yml }
          - { version: '5.0.2', compose: docker-compose.v5.yml, experimental: true }
        terraform-version:
          - '1.9.*'
          - '1.12.*'
          - '1.15.*'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ matrix.terraform-version }}
          terraform_wrapper: false
      - name: Start Dependency Track
        run: docker compose -f ${{ matrix.dtrack.compose }} up -d apiserver postgres
      - name: Init Dependency Track
        run: echo "DEPENDENCYTRACK_API_KEY=$(go run scripts/init_dtrack.go)" >> "$GITHUB_ENV"
      - run: go mod download
      - run: make testacc
