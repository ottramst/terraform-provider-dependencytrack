name: Build

on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true
      - run: make build-ci
      - uses: actions/upload-artifact@v5
        with:
          name: binary
          path: terraform-provider-dependencytrack
